mcpServers:
  tarmeer-crm:
    command: node
    args: ["index.js"]
    env:
      CRM_BASE_URL: "http://localhost:3000"
      CRM_GATEWAY_KEY: "${CRM_GATEWAY_KEY}"
      DEFAULT_TENANT_ID: "${DEFAULT_TENANT_ID}"
      DEFAULT_USER_ID: "${DEFAULT_USER_ID}"

cron:
  daily-sales-brief:
    schedule: "0 9 * * 1-5"
    prompt: |
      查询我今天需要跟进的客户。
      对每个客户评估优先级（考虑商机阶段、金额、未跟进天数）。
      按优先级排序，取 Top 5，每个附上原因和建议行动。
      输出格式：🎯 今日最重要行动。

  weekly-report:
    schedule: "0 17 * * 5"
    prompt: |
      汇总本周销售情况：新增线索数、跟进次数、商机阶段变化。
      找出本周最大风险和最大机会。
